worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # Basis
  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 50M;          # für Dokument-Uploads

  # Sicherheits-Header
  add_header X-Frame-Options         "SAMEORIGIN"   always;
  add_header X-Content-Type-Options  "nosniff"      always;
  add_header X-XSS-Protection        "1; mode=block" always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript
             application/x-javascript text/xml application/xml
             application/xml+rss text/javascript;

  # ── HTTP → HTTPS Redirect ────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;                   # ← hier deinen Hostnamen eintragen

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Moderne SSL-Einstellungen
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (nach erstem erfolgreichen Test aktivieren)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── API → Backend ────────────────────────
    location /api/ {
      proxy_pass         http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;       # für lange Exports/Uploads
    }

    # ── Frontend ─────────────────────────────
    location / {
      proxy_pass         http://frontend:80;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # SPA: alle Routen an index.html
      proxy_intercept_errors on;
      error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
      proxy_pass http://frontend:80;
    }
  }
}
