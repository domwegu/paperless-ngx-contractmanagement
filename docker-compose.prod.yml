# Production Override
# Start: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    ports: []

  redis:
    ports: []

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    volumes: []
    ports: []
    restart: always
    environment:
      APP_ENV: production

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    volumes: []
    ports: []
    restart: always

  nginx:
    image: nginx:alpine
    container_name: vv_nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
